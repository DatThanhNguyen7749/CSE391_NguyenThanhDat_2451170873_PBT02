<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm có Multimedia</title>
</head>
<body>
    <h1>iPhone 16 Pro Max</h1>
    
    <section>
        <h2>Hình ảnh sản phẩm</h2>
        <figure>
            <img src="https://placehold.co/200x200" 
                 alt="iPhone 16 Pro Max màu titan tự nhiên"
                 width="400" height="300"
                 loading="lazy">
            <figcaption>iPhone 16 Pro Max — Màu Titan Tự nhiên</figcaption>
        </figure>
        
        <figure>
            <img src="https://placehold.co/200x200" 
                 alt="iPhone 16 Pro Max màu trắng"
                 width="400" height="300"
                 loading="lazy">
            <figcaption>iPhone 16 Pro Max — Màu Trắng</figcaption>
        </figure>
        
        <figure>
            <img src="https://placehold.co/200x200" 
                 alt="iPhone 16 Pro Max màu đen"
                 width="400" height="300"
                 loading="lazy">
            <figcaption>iPhone 16 Pro Max — Màu Đen</figcaption>
        </figure>
    </section>
    
    <section>
        <h2>Video Review</h2>
        <iframe 
            src="https://www.youtube.com/embed/PmPcURrqBZM" 
            title="Video review iPhone 16 Pro Max"
            width="560" 
            height="315"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </section>
    
    <section>
        <h2>Video giới thiệu sản phẩm</h2>
        <video controls width="400" height="300" poster="thumbnail.jpg">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <source src="https://www.w3schools.com/html/mov_bbb.webm" type="video/webm">
            <p>Trình duyệt không hỗ trợ video. <a href="https://www.w3schools.com/html/mov_bbb.mp4">Tải video</a></p>
        </video>
    </section>
    
    <section>
        <h2>Nhạc nền giới thiệu</h2>
        <audio controls>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg">
            <p>Trình duyệt không hỗ trợ audio. <a href="https://www.w3schools.com/html/horse.mp3">Tải nhạc</a></p>
        </audio>
    </section>
    
    <section>
        <h2>Logo thương hiệu (SVG)</h2>
        <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#2196F3"/>
        </svg>
    </section>
    
    <section>
        <h2>Ảnh Responsive</h2>
        <picture>
            <source srcset="https://placehold.co/600x400" media="(min-width: 800px)">
            <source srcset="https://placehold.co/400x300" media="(min-width: 500px)">
            <img src="https://placehold.co/200x150" 
                 alt="Ảnh responsive tự động điều chỉnh theo kích thước">
        </picture>
    </section>
</body>
</html>
