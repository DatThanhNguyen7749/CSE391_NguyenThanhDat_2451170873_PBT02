<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - E-Commerce</title>
</head>
<body>
    <h1>Đăng ký tài khoản</h1>
    <form action="#" method="POST" id="registerForm">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <label for="fullname">Họ và tên:</label>
            <input type="text" id="fullname" name="fullname" 
                   required minlength="2" maxlength="50"
                   placeholder="Nguyễn Thành Đạt">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" 
                   required placeholder="datthanh@gmail.com">
            
            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" 
                   pattern="[0-9]{10}" required
                   placeholder="0123456789" title="Nhập 10 chữ số">
            
            <label for="birthday">Ngày sinh:</label>
            <input type="date" id="birthday" name="birthday" 
                   max="2026-04-28" required>
        </fieldset>
        
        <fieldset>
            <legend>Tài khoản</legend>
            
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" 
                   pattern="[a-zA-Z0-9_]{3,20}" required
                   placeholder="datthanh" title="3-20 ký tự, chỉ chữ cái, số, underscore">
            
            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" 
                   minlength="8" required
                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                   placeholder="Mật khẩu mạnh" title="Ít nhất 8 ký tự, gồm chữ hoa, thường, và số">
            
            <label for="confirm_password">Xác nhận mật khẩu:</label>
            <input type="password" id="confirm_password" name="confirm_password" 
                   minlength="8" required
                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                   placeholder="Nhập lại mật khẩu">
        </fieldset>
        
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            
            <label for="city">Thành phố:</label>
            <select id="city" name="city" required>
                <option value="">Chọn thành phố</option>
                <option value="hanoi">Hà Nội</option>
                <option value="saigon">Sài Gòn</option>
                <option value="dalat">Đà Lạt</option>
                <option value="haiphong">Hải Phòng</option>
                <option value="bacgiang">Bắc Giang</option>
            </select>
            
            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district" required>
                <option value="">Chọn quận/huyện</option>
                <option value="quan1">Quận 1</option>
                <option value="quan3">Quận 3</option>
                <option value="quan5">Quận 5</option>
                <option value="quan10">Quận 10</option>
            </select>
            
            <label for="address">Địa chỉ chi tiết:</label>
            <textarea id="address" name="address" rows="3"
                      placeholder="Số nhà, đường, phường/xã..."></textarea>
            </fieldset>
            
            <fieldset>
            <legend>Giới tính:</legend>
            <label>
                <input type="radio" name="gioitinh" value="nam" required>
                Nam
            </label>
            <label>
                <input type="radio" name="gioitinh" value="nu">
                Nữ
            </label>
            <label>
                <input type="radio" name="gioitinh" value="khac">
                Khác
            </label>
        </fieldset>
        
        <label>
            <input type="checkbox" name="agree" id="agree" required>
            Tôi đồng ý với điều khoản và chính sách bảo mật
        </label>
        
        <button type="submit">Đăng ký</button>
        <button type="reset">Làm lại</button>
    </form>
    
    </body>
</html>
