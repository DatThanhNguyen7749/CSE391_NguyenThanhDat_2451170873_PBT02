<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Thành Đạt</title>
</head>
<body>
    <form action="#" method="POST">
        <div>
            Trường hợp 1: required + rỗng
            <label for="case1">Nhập tên:</label>
            <input type="text" id="case1" name="case1" required>
        </div>

        <div>
            Trường hợp 2: type="email" với giá trị "abc"
            <label for="case2">Email:</label>
            <input type="email" id="case2" name="case2">
        </div>

        <div>
            Trường hợp 3: number với min=1, max=10, giá trị "15"
            <label for="case3">Số (1-10):</label>
            <input type="number" id="case3" name="case3" min="1" max="10">
        </div>

        <div>
            Trường hợp 4: pattern [0-9]{10} với giá trị "abc123"
            <label for="case4">Số điện thoại (10 chữ số):</label>
            <input type="text" id="case4" name="case4" pattern="[0-9]{10}">
        </div>

        <div>
            Trường hợp 5: password với minlength=8, giá trị "123"
            <label for="case5">Mật khẩu (tối thiểu 8 ký tự):</label>
            <input type="password" id="case5" name="case5" minlength="8">
        </div>

        <button type="submit">Submit để test validation</button>
    </form>
</body>
</html>
